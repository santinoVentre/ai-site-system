<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <title>{% block title %}AI Site System{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
            --text: #e4e4e7; --text-secondary: #9ca3af;
            --primary: #6366f1; --primary-hover: #818cf8;
            --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
            --radius: 8px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-hover); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 0; }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        nav .brand { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        nav .nav-links { display: flex; gap: 24px; align-items: center; }
        nav .nav-links a { color: var(--text-secondary); font-size: 0.9rem; }
        nav .nav-links a:hover { color: var(--text); }

        main { padding: 32px 0; }
        h1 { font-size: 1.8rem; margin-bottom: 24px; }
        h2 { font-size: 1.3rem; margin-bottom: 16px; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }

        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
        }
        .badge-success { background: rgba(34,197,94,0.15); color: var(--success); }
        .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-info { background: rgba(99,102,241,0.15); color: var(--primary); }
        .badge-neutral { background: rgba(156,163,175,0.15); color: var(--text-secondary); }

        .btn {
            display: inline-block; padding: 8px 20px; border-radius: var(--radius);
            font-size: 0.9rem; font-weight: 500; border: none; cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 4px 12px; font-size: 0.8rem; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover { background: rgba(99,102,241,0.05); }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--text); font-size: 0.95rem;
        }
        .form-group textarea { min-height: 100px; resize: vertical; font-family: inherit; }

        .mono { font-family: 'SF Mono', Monaco, monospace; font-size: 0.85rem; }
        .text-secondary { color: var(--text-secondary); }
        .text-sm { font-size: 0.85rem; }
        .mt-2 { margin-top: 16px; }
        .mb-2 { margin-bottom: 16px; }
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .items-center { align-items: center; }

        .timeline { border-left: 2px solid var(--border); margin-left: 12px; padding-left: 20px; }
        .timeline-item { margin-bottom: 16px; position: relative; }
        .timeline-item::before {
            content: ''; position: absolute; left: -27px; top: 6px;
            width: 12px; height: 12px; border-radius: 50%; background: var(--primary);
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">AI Site System</a>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/logout">Esci</a>
            </div>
        </div>
    </nav>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
