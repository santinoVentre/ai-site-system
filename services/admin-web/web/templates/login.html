<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI Site System</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117; color: #e4e4e7;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .login-card {
            background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px;
            padding: 40px; width: 100%; max-width: 400px;
        }
        h1 { text-align: center; margin-bottom: 24px; font-size: 1.5rem; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #9ca3af; }
        input {
            width: 100%; padding: 10px 14px; background: #0f1117; border: 1px solid #2a2d3a;
            border-radius: 8px; color: #e4e4e7; font-size: 0.95rem;
        }
        button {
            width: 100%; padding: 12px; background: #6366f1; color: white; border: none;
            border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 8px;
        }
        button:hover { background: #818cf8; }
        .error { color: #ef4444; text-align: center; margin-bottom: 16px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🏗 AI Site System</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
