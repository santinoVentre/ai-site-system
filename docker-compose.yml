# =============================================================
#  AI Site System — Docker Compose
#  Target: Ubuntu 24.04 VPS, single-node deployment
# =============================================================

x-common-env: &common-env
  TZ: ${GENERIC_TIMEZONE:-Europe/Rome}

services:
  # ----- Reverse Proxy -----
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-site-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./data/generated-sites:/srv/generated-sites:ro
      - ./data/cms-assets:/srv/cms-assets:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      agent-api:
        condition: service_healthy
      admin-web:
        condition: service_healthy
      n8n:
        condition: service_healthy
      telegram-bot:
        condition: service_healthy
      qa-runner:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----- PostgreSQL -----
  postgres:
    image: postgres:16-bookworm
    container_name: ai-site-postgres
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      N8N_DB_NAME: ${N8N_DB_NAME}
      N8N_DB_USER: ${N8N_DB_USER}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 256mb

  # ----- Redis -----
  redis:
    image: redis:7.4-alpine
    container_name: ai-site-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----- n8n (Workflow Orchestration) -----
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ai-site-n8n
    restart: unless-stopped
    environment:
      <<: *common-env
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${PROTOCOL}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_PATH: /n8n/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
    volumes:
      - n8ndata:/home/node/.n8n
      - ./workflows/n8n:/home/node/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----- Agent API (FastAPI) -----
  agent-api:
    build:
      context: ./services/agent-api
      dockerfile: Dockerfile
    container_name: ai-site-agent-api
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql+asyncpg://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${APP_DB_NAME}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      AGENT_API_SECRET: ${AGENT_API_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL}
      GENERATED_SITES_PATH: /data/generated-sites
      ARTIFACTS_PATH: /data/artifacts
      PREVIEW_BASE_URL: ${PREVIEW_BASE_URL}
      CMS_ASSETS_PATH: /data/cms-assets
      CMS_ASSETS_URL_PREFIX: ${CMS_ASSETS_URL_PREFIX:-/cms-assets}
      CMS_MAX_UPLOAD_BYTES: ${CMS_MAX_UPLOAD_BYTES:-8388608}
      CMS_IMAGE_MAX_DIMENSION: ${CMS_IMAGE_MAX_DIMENSION:-2400}
      SITE_BASE_URL: ${SITE_BASE_URL:-https://agent.santinoventre.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      DOMAIN: ${DOMAIN}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      AI_IMAGES_ENABLED: ${AI_IMAGES_ENABLED:-false}
      QUALITY_SCORE_THRESHOLD: ${QUALITY_SCORE_THRESHOLD:-80}
      QUALITY_MAX_ITERATIONS: ${QUALITY_MAX_ITERATIONS:-2}
      QA_RUNNER_URL: ${QA_RUNNER_URL:-http://qa-runner:8001}
      QA_ENABLED: ${QA_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-60/minute}
      RATE_LIMIT_PUBLIC: ${RATE_LIMIT_PUBLIC:-60/minute}
    volumes:
      - ./data/generated-sites:/data/generated-sites
      - ./data/artifacts:/data/artifacts
      - ./data/cms-assets:/data/cms-assets
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ----- Telegram Bot -----
  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: ai-site-telegram-bot
    restart: unless-stopped
    environment:
      <<: *common-env
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID}
      AGENT_API_URL: http://agent-api:8000
      AGENT_API_SECRET: ${AGENT_API_SECRET}
      N8N_WEBHOOK_URL: http://n8n:5678
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/2"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
    depends_on:
      agent-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ----- QA Runner (Playwright) -----
  qa-runner:
    build:
      context: ./services/qa-runner
      dockerfile: Dockerfile
    container_name: ai-site-qa-runner
    restart: unless-stopped
    environment:
      <<: *common-env
      AGENT_API_URL: http://agent-api:8000
      AGENT_API_SECRET: ${AGENT_API_SECRET}
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
    volumes:
      - ./data/artifacts:/data/artifacts
      - ./data/generated-sites:/data/generated-sites:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    ipc: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----- Admin Web Dashboard -----
  admin-web:
    build:
      context: ./services/admin-web
      dockerfile: Dockerfile
    container_name: ai-site-admin-web
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql+asyncpg://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${APP_DB_NAME}"
      AGENT_API_URL: http://agent-api:8000
      AGENT_API_SECRET: ${AGENT_API_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
  n8ndata:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: false
