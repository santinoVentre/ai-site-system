# ============================================================
#  Main site config — HTTP (upgrade to HTTPS with certbot)
# ============================================================

# Upstreams
upstream agent_api {
    server agent-api:8000;
}

upstream admin_web {
    server admin-web:8002;
}

upstream n8n_backend {
    server n8n:5678;
}

upstream telegram_bot {
    server telegram-bot:8080;
}

upstream qa_runner {
    server qa-runner:8001;
}

# Health endpoint (used by docker healthcheck)
server {
    listen 80;
    server_name 127.0.0.1;

    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}

# Main server block
server {
    listen 80 default_server;
    server_name agent.santinoventre.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main TLS server block
server {
    listen 443 ssl;
    server_name agent.santinoventre.com;

    ssl_certificate /etc/letsencrypt/live/agent.santinoventre.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.santinoventre.com/privkey.pem;

    # ---- Agent API ----
    location /api/ {
        proxy_pass http://agent_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # ---- n8n ----
    location /n8n/ {
        proxy_pass http://n8n_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
        proxy_buffering off;
    }

    # ---- Telegram webhook ----
    location /webhook/telegram {
        proxy_pass http://telegram_bot/webhook/telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- QA Runner API (internal, but exposed for n8n) ----
    location /qa/ {
        proxy_pass http://qa_runner/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- Preview sites ----
    location /preview/ {
        alias /srv/generated-sites/;
        autoindex off;
        index index.html;

        # Security: no directory listing, no script execution
        location ~* \.(php|cgi|pl|py)$ {
            deny all;
        }
    }

    # ---- Admin Dashboard (root) ----
    location / {
        proxy_pass http://admin_web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
